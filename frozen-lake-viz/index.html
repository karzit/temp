<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Frozen Lake - Q-Learning 100 Units Visualization</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Frozen Lake — 100 Units 가중치 업데이트 시각화 (60fps)</h1>
    <div class="layout">
      <canvas id="lake" width="640" height="640"></canvas>
      <div class="panel">
        <div class="stat"><span>Episode</span><b id="stat-episode">0</b></div>
        <div class="stat"><span>FPS</span><b id="stat-fps">0</b></div>
        <div class="stat"><span>Goals Reached</span><b id="stat-goals">0</b></div>
        <div class="stat"><span>Avg Q (max)</span><b id="stat-avgq">0.000</b></div>
        <div class="legend">
          <div><span class="swatch ice"></span>Ice</div>
          <div><span class="swatch hole"></span>Hole</div>
          <div><span class="swatch start"></span>Start</div>
          <div><span class="swatch goal"></span>Goal</div>
          <div><span class="swatch agent"></span>Unit (agent)</div>
        </div>
        <p class="desc">
          100개의 에이전트가 동시에 Frozen Lake 그리드 위에서 Q-Learning으로
          가중치(Q-table)를 업데이트하며 이동합니다. 셀의 배경 밝기는 해당 상태의
          최대 Q값(학습된 가중치)을 나타냅니다.
        </p>
        <button id="toggle">일시정지</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
